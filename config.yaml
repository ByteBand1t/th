shodan:
  api_key: "${SHODAN_API_KEY}"
  queries:
    # Standard-Port, Uni-Server bevorzugt
    - 'ollama port:11434 org:"University"'
    - 'ollama port:11434 org:"Universitaet"'
    - 'ollama port:11434 org:"Hochschule"'
    - 'ollama port:11434 org:"Institut"'
    - 'ollama port:11434 org:"Research"'
    - 'ollama port:11434'
    # Beliebige Ports — sucht nach Ollama-Banner im HTTP-Response
    - 'http.title:"Ollama" org:"University"'
    - 'http.title:"Ollama" org:"Research"'
    - 'http.title:"Ollama"'
    # Ollama API-Endpunkt erkennbar am JSON-Response
    - '"llama_server" port:11435'
    - '"ollama" "models" http.status:200'
  max_results: 50
  exclude_orgs:
    - "Amazon"
    - "AWS"
    - "AMAZON"

litellm:
  base_url: "${LITELLM_BASE_URL}"
  master_key: "${LITELLM_MASTER_KEY}"

target_models:
  - qwen3-coder-next
  - qwen3
  - deepseek-coder-v2
  - llama3
  - mistral
  - gemma3
  - phi4
  - glm-4
  - gemma4

benchmark:
  enabled: true
  prompt: "Hallo, wie geht es dir?"
  max_ttft_seconds: 8.0
  min_tokens_per_second: 5.0
  min_response_length: 20
  runs: 2

litellm_model_tag: "ollama-scout"
