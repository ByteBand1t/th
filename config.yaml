shodan:
  api_key: "${SHODAN_API_KEY}"
  queries:
    - 'port:11434 org:University'
    - 'port:11434 org:Universitaet'
    - 'port:11434 org:Universitat'
    - 'port:11434 org:Hochschule'
    - 'port:11434 org:Institut'
    - 'port:11434 org:Research'
    - 'port:11434 org:College'
    - 'port:11434 org:Academic'
    - 'port:11434 org:Science'
    - 'port:11434 org:Laboratory'
    - 'port:11434 org:CNRS'
    - 'port:11434 org:MIT'
    - 'port:11434 org:ETH'
    - 'port:11434 org:Helmholtz'
    - 'port:11434 org:Max-Planck'
    - 'port:11434 org:Fraunhofer'
    - 'port:11434 org:ORNL'
    - 'port:11434 org:ANL'
    - 'port:11434 org:NII'
    - 'http.title:Ollama'
    - 'product:"Ollama"'
    - 'port:11434'
  max_results: 100
  exclude_orgs:
    - "Amazon"
    - "AWS"
    - "Google"
    - "Microsoft"
    - "Azure"
    - "OVH"
    - "DigitalOcean"
    - "Linode"
    - "Vultr"
  exclude_ips:
    - "45.79.132.184"

litellm:
  base_url: "${LITELLM_BASE_URL}"
  master_key: "${LITELLM_MASTER_KEY}"

# Model name patterns that indicate cloud-proxy models → skip
exclude_model_patterns:
  - ":cloud"
  - "-cloud"
  - "cloud:"

target_models:
  # ── Qwen family ──────────────────────────────
  - name: qwen3-coder-next
    min_size_b: 0
  - name: qwen3-coder
    min_size_b: 27
  - name: qwen3
    min_size_b: 27
  - name: qwen3.5
    min_size_b: 27
  - name: qwen2.5-coder
    min_size_b: 27
  # ── DeepSeek family ──────────────────────────
  - name: deepseek-coder-v2
    min_size_b: 27
  - name: deepseek-r1
    min_size_b: 27
  # ── Llama family ─────────────────────────────
  - name: llama3.3
    min_size_b: 27
  - name: llama4
    min_size_b: 0
  # ── Mistral / Mixtral ─────────────────────────
  - name: mixtral
    min_size_b: 0
  - name: mistral-small
    min_size_b: 20
  - name: devstral
    min_size_b: 0
  # ── Google ────────────────────────────────────
  - name: gemma3
    min_size_b: 27
  - name: gemma4
    min_size_b: 27
  # ── Microsoft ────────────────────────────────
  - name: phi4
    min_size_b: 0
  # ── Moonshot / Kimi ──────────────────────────
  - name: kimi-k2
    min_size_b: 0
  # ── NVIDIA ───────────────────────────────────
  - name: nemotron
    min_size_b: 27
  # ── IBM ──────────────────────────────────────
  - name: granite4
    min_size_b: 0
  - name: granite3
    min_size_b: 0
  # ── Other ────────────────────────────────────
  - name: command-r
    min_size_b: 0
  - name: glm-4
    min_size_b: 0
  - name: glm-5
    min_size_b: 0
  - name: minimax-m2
    min_size_b: 0

benchmark:
  enabled: true
  prompt: "Write a Python function that takes a list of numbers and returns the mean, median, and standard deviation. Include type hints and a docstring."
  max_ttft_seconds: 15.0
  min_tokens_per_second: 3.0
  min_response_length: 20
  runs: 2
  # Tool-calling test
  tool_call_test: true

benchmark_large:
  enabled: true
  prompt: "Refactor this Python class to use async/await and add proper error handling: class DataFetcher: def fetch(self, url): import requests; return requests.get(url).json()"
  max_ttft_seconds: 120.0
  min_tokens_per_second: 0.3
  min_response_length: 10
  runs: 1

# Models >= this size (B) use benchmark_large profile
large_model_threshold_b: 100

# Honeypot detection — flags fake servers that report impossible benchmarks
honeypot_detection:
  enabled: true
  # Models >= this size (B) showing TPS above this are honeypots
  # A real 30B model can do ~15-20 TPS max on high-end hardware
  max_tps_large: 25.0
  large_threshold_b: 14.0
  # Real large models report context >= this — 4k context for a 70B is a red flag
  min_context_large: 8192

litellm_model_tag: "ollama-scout"

# These models are so rare/powerful that we accept any response regardless of TPS/TTFT
# as long as the model actually responded with something
priority_models:
  - minimax-m2
  - glm-5
  - glm-4
  - kimi-k2
  - qwen3-coder-next
