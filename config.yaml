shodan:
  api_key: "${SHODAN_API_KEY}"
  queries:
    - 'ollama port:11434 org:"University"'
    - 'ollama port:11434 org:"Universitaet"'
    - 'ollama port:11434 org:"Hochschule"'
    - 'ollama port:11434 org:"Institut"'
    - 'ollama port:11434 org:"Research"'
    - 'ollama port:11434'
    - 'http.title:"Ollama" org:"University"'
    - 'http.title:"Ollama" org:"Research"'
    - 'http.title:"Ollama"'
    - '"ollama" "models" http.status:200'
  max_results: 50
  exclude_orgs:
    - "Amazon"
    - "AWS"
    - "AMAZON"
    - "Google"
    - "Microsoft"
    - "Azure"
    - "OVH"

litellm:
  base_url: "${LITELLM_BASE_URL}"
  master_key: "${LITELLM_MASTER_KEY}"

target_models:
  # Nur 27B+ Modelle — kleine Modelle sind für Paperclip zu schwach
  - name: qwen3-coder-next
    min_size_b: 30
  - name: qwen3
    min_size_b: 27
  - name: qwen2.5-coder
    min_size_b: 27
  - name: deepseek-coder-v2
    min_size_b: 27
  - name: deepseek-r1
    min_size_b: 27
  - name: llama3.3
    min_size_b: 27
  - name: mixtral
    min_size_b: 0
  - name: mistral-small
    min_size_b: 20
  - name: gemma3
    min_size_b: 27
  - name: gemma4
    min_size_b: 27
  - name: phi4
    min_size_b: 0
  - name: command-r
    min_size_b: 0
  - name: glm-4
    min_size_b: 0

benchmark:
  enabled: true
  prompt: "Hallo, wie geht es dir?"
  max_ttft_seconds: 5.0
  min_tokens_per_second: 8.0
  min_response_length: 20
  runs: 3

litellm_model_tag: "ollama-scout"
