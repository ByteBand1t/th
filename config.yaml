shodan:
  api_key: "${SHODAN_API_KEY}"
  queries:
    - 'port:11434 org:University'
    - 'port:11434 org:Universitaet'
    - 'port:11434 org:Universitat'
    - 'port:11434 org:Hochschule'
    - 'port:11434 org:Institut'
    - 'port:11434 org:Research'
    - 'port:11434 org:College'
    - 'port:11434 org:Academic'
    - 'port:11434 org:Science'
    - 'port:11434 org:Laboratory'
    - 'port:11434 org:CNRS'
    - 'port:11434 org:MIT'
    - 'port:11434 org:ETH'
    - 'http.title:Ollama'
    - 'port:11434'
  max_results: 100
  exclude_orgs:
    - "Amazon"
    - "AWS"
    - "Google"
    - "Microsoft"
    - "Azure"
    - "OVH"
    - "DigitalOcean"
    - "Linode"
    - "Vultr"

litellm:
  base_url: "${LITELLM_BASE_URL}"
  master_key: "${LITELLM_MASTER_KEY}"

target_models:
  # Nur 27B+ Modelle — kleine Modelle sind für Paperclip zu schwach
  - name: qwen3-coder-next
    min_size_b: 30
  - name: qwen3
    min_size_b: 27
  - name: qwen2.5-coder
    min_size_b: 27
  - name: deepseek-coder-v2
    min_size_b: 27
  - name: deepseek-r1
    min_size_b: 27
  - name: llama3.3
    min_size_b: 27
  - name: mixtral
    min_size_b: 0
  - name: mistral-small
    min_size_b: 20
  - name: gemma3
    min_size_b: 27
  - name: gemma4
    min_size_b: 27
  - name: phi4
    min_size_b: 0
  - name: command-r
    min_size_b: 0
  - name: glm-4
    min_size_b: 0

benchmark:
  enabled: true
  prompt: "Hallo, wie geht es dir?"
  max_ttft_seconds: 15.0
  min_tokens_per_second: 3.0
  min_response_length: 20
  runs: 2

litellm_model_tag: "ollama-scout"
